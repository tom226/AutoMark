name: Autopilot Process Scheduler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trigger-autopilot:
    runs-on: ubuntu-latest
    steps:
      - name: Call autopilot process endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret is not set"
            exit 1
          fi

          URL="$APP_URL/api/autopilot/process"
          if [ -n "$CRON_SECRET" ]; then
            curl -fsS -X GET "$URL?secret=$CRON_SECRET"
          else
            curl -fsS -X GET "$URL"
          fi
